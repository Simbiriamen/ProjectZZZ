# ==============================================================================
# ProjectZZZ - Конфигурация системы
# Версия: 3.2
# 🔧 ИСПРАВЛЕНИЕ: Пароли вынесены в переменные окружения
# ==============================================================================

# ------------------------------------------------------------------------------
# ПОДКЛЮЧЕНИЕ К БАЗЕ ДАННЫХ
# ------------------------------------------------------------------------------
database:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  name: ${DB_NAME:project_zzz_db}
  user: ${DB_USER:postgres}
  password: ${DB_PASSWORD}  # 🔧 Обязательно из переменной окружения!

# ------------------------------------------------------------------------------
# ПУТИ К ДАННЫМ
# ------------------------------------------------------------------------------
paths:
  data_raw: D:/ProjectZZZ/data/raw
  data_processed: D:/ProjectZZZ/data/processed
  data_output: D:/ProjectZZZ/data/output
  models: D:/ProjectZZZ/models
  logs: D:/ProjectZZZ/docs/logs

# ------------------------------------------------------------------------------
# A/B ТЕСТИРОВАНИЕ (НОВОЕ!)
# ------------------------------------------------------------------------------
ab_test:
  enabled: true
  start_date: "2026-03-22"
  test_group_ratio: 0.5  # 50% клиентов в тест-группе
  assignment_method: "hash"  # детерминированное распределение
  metrics:
    primary: "hit_rate"
    secondary: ["precision_5", "brier_score"]
  promotion:
    min_duration_days: 14  # мин. дней теста перед решением
    significance_level: 0.05  # p-value порог
    min_uplift: 0.03  # мин. улучшение 3%
    auto_promote: true  # авто-переключение при успехе
  degradation:
    critical_threshold: 0.05  # падение ≥5% = критическое
    action: "rollback"  # действие при деградации

# ------------------------------------------------------------------------------
# ПАРАМЕТРЫ ГЕНЕРАЦИИ РЕКОМЕНДАЦИЙ
# ------------------------------------------------------------------------------
recommendations:
  min_probability_threshold: 0.2  # мин. вероятность для "Новых"
  trend_threshold_develop: 0.02  # порог тренда для "Развития"
  trend_threshold_retain: -0.02  # порог тренда для "Возврата"
  min_stock: 1  # мин. остаток для кандидата
  max_recommendations: 5  # макс. SKU на клиента

# ------------------------------------------------------------------------------
# ПАРАМЕТРЫ МОДЕЛЕЙ
# ------------------------------------------------------------------------------
models:
  default_algorithm: "lightgbm"
  calibration_method: "sigmoid"
  min_training_samples: 10000
  validation_split: 0.2
  random_state: 42

# ------------------------------------------------------------------------------
# ЛОГИРОВАНИЕ
# ------------------------------------------------------------------------------
logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(message)s"
  max_file_size_mb: 10
  backup_count: 5
