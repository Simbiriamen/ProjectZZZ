# =============================================================================
# PYTEST CONFIGURATION FOR PROJECTZZZ
# =============================================================================

[pytest]
minversion = 7.0
addopts = -ra -q --strict-markers --strict-config --cov=src --cov-report=term-missing --cov-report=html:docs/coverage
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Маркеры для категоризации тестов
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    edge_case: marks tests testing edge cases

# Настройки покрытия вынесены в pyproject.toml или .coveragerc
